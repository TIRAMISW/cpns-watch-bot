name: CPNS Watch

on:
  workflow_dispatch:
  schedule:
    # 01:00 UTC = 08:00 WIB. GitHub schedule memakai UTC.
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run CPNS watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS }}
        run: python run_cpns_watch.py --notify

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpns-report
          path: |
            reports/latest.md
            data/seen.json

      - name: Commit latest report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest.md data/seen.json
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update CPNS watch report"
            git push
          fi
